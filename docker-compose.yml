version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_NAME: lms_db
      DB_USER: lms_user
      DB_PASSWORD: lms_pass
      DB_HOST: db
      DB_PORT: 5432

volumes:
  postgres_data: